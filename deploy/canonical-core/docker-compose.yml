version: '3.8'

services:
  frasberg-core:
    container_name: frasberg_canonical_core
    build:
      context: ../..
      dockerfile: deploy/canonical-core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - SERVICE_NAME=canonical-core
      - VERSION=v1.0.0
    volumes:
      - ../../backend/app:/app/app
    restart: unless-stopped
    networks:
      - frasberg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  frasberg-network:
    driver: bridge
