name: Deploy Sofia Core Backend

on:
  push:
    branches: [ main ]
    paths:
      - "functions/**"
      - ".github/workflows/deploy-sofia.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Supabase Login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Project
        run: supabase link --project-ref sdtilgpppwhwtbxlbmik

      - name: Set Secrets
        env:
          SOFIA_URL: ${{ secrets.SOFIA_URL }}
          SOFIA_API_KEY: ${{ secrets.SOFIA_API_KEY }}
        run: |
          supabase secrets set SOFIA_URL="$SOFIA_URL" SOFIA_API_KEY="$SOFIA_API_KEY"

      - name: Deploy Edge Functions
        run: supabase functions deploy sofia-core-backend

      - name: Deployment Success
        run: |
          echo "✅ Sofia Core Backend deployed successfully"
          echo "🌐 Endpoint: https://sdtilgpppwhwtbxlbmik.supabase.co/functions/v1/sofia-core-backend"
