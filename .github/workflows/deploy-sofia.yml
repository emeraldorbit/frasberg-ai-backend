name: Deploy Sofia Core Backend

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  SUPABASE_PROJECT_ID: sdtilgpppwhwtbxlbmik

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd sdk/typescript
          npm install || true

      - name: TypeScript SDK tests
        run: |
          echo "Running TypeScript SDK tests..."
          # Add your test commands here

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd sdk/python
          pip install -r requirements-test.txt || pip install requests pytest

      - name: Python SDK tests
        run: |
          echo "Running Python SDK tests..."
          # Add your test commands here

  deploy-function:
    name: Deploy Edge Function
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to Supabase
        run: |
          supabase functions deploy sofia-core-backend \
            --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set environment variables
        run: |
          supabase secrets set \
            MODEL_ENDPOINT="${{ secrets.MODEL_ENDPOINT }}" \
            MODEL_API_KEY="${{ secrets.MODEL_API_KEY }}" \
            --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-docs:
    name: Deploy Documentation
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

  publish-sdks:
    name: Publish SDKs
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish TypeScript SDK
        run: |
          cd sdk/typescript
          npm install
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish JavaScript SDK
        run: |
          cd sdk/js
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: |
          cd cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Publish Python SDK
        run: |
          cd sdk/python
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  notify:
    name: Notify Deployment
    needs: [deploy-function, deploy-docs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment completed!"
          # Add your notification logic here (Slack, Discord, etc.)
