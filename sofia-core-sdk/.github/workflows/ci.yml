name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: sofia-core-sdk
      
      - name: Type check
        run: npm run build -- --noEmit
        working-directory: sofia-core-sdk
      
      - name: Build
        run: npm run build
        working-directory: sofia-core-sdk
      
      - name: Run tests
        run: npm test
        working-directory: sofia-core-sdk
        env:
          AI_API_KEY_SOURCE: github
          IMAGE_API_KEY_SOURCE: github
          VIDEO_API_KEY_SOURCE: github
          SOFIA_CORE_API_KEY: test-key
          SOFIA_CORE_API_URL: https://test.api.example.com

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: sofia-core-sdk
      
      - name: Check formatting
        run: npx prettier --check "src/**/*.ts"
        working-directory: sofia-core-sdk
